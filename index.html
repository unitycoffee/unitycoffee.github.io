<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNITY — Меню</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0f0a;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .viewer { width: 100%; height: 100dvh; position: relative; overflow: hidden; }
  .slides {
    display: flex;
    width: 300%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .slide {
    width: calc(100% / 3);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .dots {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }
  .dot.active { background: #c8813a; transform: scale(1.3); }
  .arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: rgba(200,129,58,0.18);
    border: 1.5px solid rgba(200,129,58,0.4);
    color: #c8813a;
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .arrow:active { background: rgba(200,129,58,0.4); }
  .arrow.left { left: 10px; }
  .arrow.right { right: 10px; }
  .arrow.hidden { opacity: 0; pointer-events: none; }
  .page-label {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200,129,58,0.7);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>

<div class="page-label" id="label">1 / 3</div>
<button class="arrow left hidden" id="arrowLeft" onclick="prev()">&#8592;</button>
<button class="arrow right" id="arrowRight" onclick="next()">&#8594;</button>
<div class="dots">
  <div class="dot active" onclick="goTo(0)" id="d0"></div>
  <div class="dot" onclick="goTo(1)" id="d1"></div>
  <div class="dot" onclick="goTo(2)" id="d2"></div>
</div>

<script>
  let current = 0;
  const total = 3;
  const slides = document.getElementById("slides");

  function goTo(n) {
    current = Math.max(0, Math.min(total - 1, n));
    slides.style.transform = "translateX(-" + (current * 100 / total) + "%)";
    for (let i = 0; i < total; i++) {
      document.getElementById("d" + i).className = "dot" + (i === current ? " active" : "");
    }
    document.getElementById("arrowLeft").className = "arrow left" + (current === 0 ? " hidden" : "");
    document.getElementById("arrowRight").className = "arrow right" + (current === total - 1 ? " hidden" : "");
    document.getElementById("label").textContent = (current + 1) + " / " + total;
  }

  function prev() { goTo(current - 1); }
  function next() { goTo(current + 1); }

  let startX = 0;
  const viewer = document.getElementById("viewer");
  viewer.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, {passive: true});
  viewer.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
  }, {passive: true});
</script>
